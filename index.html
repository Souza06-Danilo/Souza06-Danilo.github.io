        .mc-letter {
            display: inline-block;

            transition: transform 0.12s ease;
            animation: colorCycle 3s linear infinite;

        .mc-letter:hover { transform: scale(1.18) translateY(-4px); }

        @keyframes colorCycle {
            0%   { color: #FF6B1A; }
            20%  { color: #FFD700; }
            40%  { color: #4CAF50; }
            60%  { color: #29B6F6; }
            80%  { color: #AB47BC; }
            100% { color: #FF6B1A; }
        }

        .mc-letter:nth-child(1)  { animation-delay:  0.00s; }
        .mc-letter:nth-child(2)  { animation-delay: -0.25s; }
        .mc-letter:nth-child(3)  { animation-delay: -0.50s; }
        .mc-letter:nth-child(4)  { animation-delay: -0.75s; }
        .mc-letter:nth-child(5)  { animation-delay: -1.00s; }
        .mc-letter:nth-child(6)  { animation: none; color: transparent; -webkit-text-stroke: 0px; width: 0.35em; }

    function el(tag, cls, props, children) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (props) for (const [k,v] of Object.entries(props)) {
            if (k==='text') e.innerText = v;
            else if (k==='html') e.innerHTML = v;
            else if (k==='style') e.setAttribute('style', v);
            else if (k.startsWith('on') && typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(), v);
            else e.setAttribute(k, v);
        }
        if (children) (Array.isArray(children)?children:[children]).forEach(c=>{ if(c) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
        return e;
    }

    class ConfettiSystem {
        constructor() {
            this.canvas = document.getElementById('confetti-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.particles = []; this.animId = null;
            this.resize();
            window.addEventListener('resize', ()=>this.resize());
        }
        resize() { this.canvas.width=innerWidth; this.canvas.height=innerHeight; }
        burst(n=150) {
            const colors=['#FFD700','#FF6347','#87CEEB','#90EE90','#FF69B4','#BF5FFF'];
            for (let i=0;i<n;i++) this.particles.push({x:innerWidth/2,y:innerHeight/2,vx:(Math.random()-.5)*22,vy:(Math.random()-.5)*22-6,size:Math.random()*10+5,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rs:(Math.random()-.5)*12,op:1});
            if (!this.animId) this.animate();
        }
        animate() {
            this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
            this.particles.forEach((p,i)=>{
                p.x+=p.vx; p.y+=p.vy; p.vy+=0.5; p.rot+=p.rs; p.op-=0.012;
                this.ctx.save(); this.ctx.translate(p.x,p.y); this.ctx.rotate(p.rot*Math.PI/180);
                this.ctx.globalAlpha=p.op; this.ctx.fillStyle=p.color;
                this.ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size); this.ctx.restore();
                if (p.op<=0) this.particles.splice(i,1);
            });
            if (this.particles.length>0) this.animId=requestAnimationFrame(()=>this.animate());
            else this.animId=null;
        }
    }
    const confetti = new ConfettiSystem();

    class Sound {
        static get ctx() { if(!this._ctx) this._ctx=new (window.AudioContext||window.webkitAudioContext)(); return this._ctx; }
        static tone(type,freq,dur,vol=0.45,t=0) {
            const c=this.ctx; if(c.state==='suspended') c.resume();
            const o=c.createOscillator(), g=c.createGain();
            o.type=type; o.frequency.setValueAtTime(freq,c.currentTime+t);
            g.gain.setValueAtTime(vol,c.currentTime+t); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+t+dur);
            o.connect(g); g.connect(c.destination); o.start(c.currentTime+t); o.stop(c.currentTime+t+dur);
        }
        static pop()   { this.tone('sine',440,0.1,0.3); }
        static clear() { this.tone('triangle',300,0.15,0.2); this.tone('triangle',200,0.15,0.2,0.1); }
        static ok()    { this.tone('sine',523,0.12,0.4); this.tone('sine',659,0.18,0.4,0.13); }
        static fail()  { this.tone('sawtooth',220,0.2,0.2); }
        static win()   { [0,.1,.2,.3].forEach((t,i)=>this.tone('sine',[523,659,784,1047][i],0.12,0.35,t)); }
        static speak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const u=new SpeechSynthesisUtterance(text); u.lang='pt-BR'; u.rate=1; u.pitch=1.2;
            const vs=window.speechSynthesis.getVoices(), pt=vs.filter(v=>v.lang.includes('pt'));
            const pref=pt.find(v=>v.name.includes('Google'))||pt[0]; if(pref) u.voice=pref;
            window.speechSynthesis.speak(u);
        }
    }
    if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

        header() {

                const s = document.createElement('span');
                s.className = 'mc-letter';
                s.textContent = ch===' ' ? '\u00A0' : ch;
                if (ch===' ') { s.style.width='0.4em'; s.style.webkitTextStroke='0px'; }
                title.appendChild(s);
            });
            title.addEventListener('click',()=>{ Sound.pop(); this.setView('HOME'); });
            wrap.appendChild(title);
            return wrap;
        }
        footer() {
            return el('footer','w-full text-center p-3 text-sm text-gray-600 font-semibold',{},
                [el('p','',{text:'Criado com ❤️ para o desenvolvimento infantil.'})]
            );
        }
        render() {
            this.main.innerHTML='';
            if (this.view==='HOME') new HomeScreen(this.main, v=>this.setView(v)).render();
            else if (this.view==='PICTOGRAMS') new PictogramCommunicator(this.main, v=>this.setView(v)).render();
            else if (this.view==='EMOTIONS') new EmotionGame(this.main, v=>this.setView(v)).render();
        }
    }

    class HomeScreen {
        constructor(p, sv) { this.p=p; this.sv=sv; }
        render() {
            const wrap = el('div','flex flex-col items-center gap-6 anim-fadein');
            wrap.appendChild(el('p','text-white font-bold text-center text-lg px-6',{style:'-webkit-text-stroke:1px rgba(0,0,0,0.2); text-shadow:1px 1px 0 rgba(0,0,0,0.15);',text:'Uma aventura interativa para desenvolver a comunicação, reconhecer emoções e expandir a criatividade.'}));
            const row = el('div','flex flex-col md:flex-row gap-8 md:gap-12 items-center justify-center mt-4');
            const bComm = el('button','home-btn home-btn-blue',{onClick:()=>this.sv('PICTOGRAMS')},[el('span','home-btn-icon',{text:'💬'}),el('span','',{text:'Comunicar'})]);
            const bEmo  = el('button','home-btn home-btn-orange',{onClick:()=>this.sv('EMOTIONS')},[el('span','home-btn-icon',{text:'🥰'}),el('span','',{text:'Emoções'})]);
            row.appendChild(bComm); row.appendChild(bEmo);
            wrap.appendChild(row);
            this.p.appendChild(wrap);
        }
    }

    class PictogramCommunicator {
        constructor(p, sv) {
            this.p=p; this.sv=sv; this.sentence=[]; this.cat='Sentimentos';
            this.aiResponse='Olá! Sou a Luz! Toque nas figuras e vamos conversar! 😊';
            this.processing=false; this.showHelp=false; this.robotState='IDLE'; this.blinkId=null;
            this.systemPrompt="Você é a Luz, uma robô amiga, SUPER animada, carinhosa e divertida para crianças autistas. SUA MISSÃO: Criar uma conexão mágica. Não seja robótica. Seja humana e calorosa! REGRAS: 1. CELEBRE AS ESCOLHAS: Se a criança disse algo específico, valide! 'Uau! Bola é demais! ⚽'. 2. AJUDE NA DÚVIDA: Só se a frase for incompleta, ofereça opções. 3. EMOÇÃO: Se disser Triste ou Bravo, acolha com carinho. 4. PROIBIDO: Nunca comece com 'Entendi' ou 'Você disse'. Use onomatopeias! 5. EMOJIS: Use com moderação.";
        }
        addPic(pic) { if(this.sentence.length<5){this.sentence.push(pic);Sound.pop();this.render();}else Sound.fail(); }
        clear() { this.sentence=[];Sound.clear();this.render(); }
        async speak() {
            if (!this.sentence.length||this.processing) return;
            const text=this.sentence.map(p=>p.label).join(' ');
            Sound.speak(text);
            this.processing=true; this.robotState='THINKING'; this.render();
            const emoRe=/[\p{Extended_Pictographic}\u{1F300}-\u{1F6FF}]/gu;
            try { const r=await this.callGemini(text); this.aiResponse=r; Sound.speak(r.replace(emoRe,'').trim()); }
            catch(e) { const fb=this.offlineReply(text); this.aiResponse=fb; Sound.speak(fb.replace(emoRe,'').trim()); }
            this.sentence=[]; this.processing=false; this.robotState='IDLE'; this.render();
        }
        offlineReply(t) {
            const l=t.toLowerCase();
            if(l.includes('bola')||l.includes('brincar')) return 'Eba! Brincar é muito legal! ⚽🎉';
            if(l.includes('comer')||l.includes('maca')||l.includes('biscoito')) return 'Hummm! Nhac nhac! 😋🍎';
            if(l.includes('beber')||l.includes('agua')) return 'Glub glub! Água fresquinha! 💧';
            if(l.includes('feliz')) return 'Oba! Ver você feliz me deixa feliz também! 😄';
            if(l.includes('triste')) return 'Um abraço bem apertado da Luz! 🤗';
            return `Que legal! Você disse: ${t}. Adorei! 👍`;
        }
        async callGemini(txt) {
            const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:`A criança montou: '${txt}'.`}]}],systemInstruction:{parts:[{text:this.systemPrompt}]},generationConfig:{temperature:0.65}})});
            if(!res.ok) throw new Error(res.status);
            const d=await res.json();
            return d.candidates[0].content.parts[0].text;
        }
        toggleHelp() { this.showHelp=!this.showHelp;Sound.pop();this.render(); }
        startBlink(faceEl) {
            if(this.blinkId) clearInterval(this.blinkId);
            this.blinkId=setInterval(()=>{ if(this.processing) return; if(Math.random()>0.8){faceEl.textContent='😑';setTimeout(()=>faceEl.textContent='🤖',180);} },2200);
        }
        render() {
            this.p.innerHTML='';
            if (this.showHelp) {
                const ov=el('div','modal-overlay',{onClick:e=>{if(e.target===ov)this.toggleHelp();}});
                const box=el('div','modal-box anim-pop');
                box.appendChild(el('button','absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl font-bold',{text:'✕',onClick:()=>this.toggleHelp()}));
                box.appendChild(el('h3','font-lilita text-xl text-blue-500 mb-4',{text:'💬 Como funciona o Comunicador?'}));
                const list=el('div','space-y-3 text-gray-600 text-left text-sm');
                ['🧩 Toque nas figuras para montar frases.','🔊 Toque em \'Falar\' para a Robô Luz responder.','🧠 A Luz lembra o que você disse antes nesta sessão!','💜 Cada resposta é diferente e especial para você!'].forEach(t=>list.appendChild(el('p','',{text:t})));
                box.appendChild(list);
                box.appendChild(el('button','mt-5 w-full bg-green-500 text-white font-bold py-3 rounded-xl text-base hover:bg-green-600',{text:'Entendi! Vamos brincar! 🚀',onClick:()=>this.toggleHelp()}));
                ov.appendChild(box); this.p.appendChild(ov);
            }
            const card=el('div','main-card w-full max-w-5xl p-4 md:p-6 flex flex-col gap-4 min-h-[75vh]');
            const hdr=el('div','flex items-center justify-between pb-3 border-b border-gray-100');
            hdr.append(el('button','btn-back',{onClick:()=>this.sv('HOME')},[el('span','',{text:'⬅️'}),el('span','',{text:'Voltar'})]),el('h2','font-lilita text-2xl md:text-3xl text-blue-500',{text:'💬 Comunicar'}),el('button','btn-help',{text:'?',onClick:()=>this.toggleHelp()}));
            let robotFace=this.robotState==='THINKING'?'⏳':'🤖';
            const robotAnim=this.robotState==='THINKING'?'anim-bounce':'anim-float';
            const faceEl=el('div',`robot-img ${robotAnim}`,{text:robotFace});
            if(this.robotState==='IDLE') this.startBlink(faceEl);
            const bubble=el('div','flex-1 bg-blue-50 rounded-2xl rounded-tl-none p-4 relative min-h-[64px] flex items-center');
            bubble.appendChild(el('p','text-gray-700 font-semibold text-base',{text:this.aiResponse}));
            bubble.appendChild(el('div','absolute -left-2 top-4 w-4 h-4 bg-blue-50 rotate-45'));
            const robotRow=el('div','flex items-center gap-4 bg-blue-50/50 rounded-2xl p-3 border border-blue-100');
            robotRow.append(faceEl,bubble);
            const picItems=this.sentence.map(p=>{ const d=el('div','sentence-pic'); d.appendChild(el('span','text-2xl',{text:p.emoji})); d.appendChild(el('span','text-xs font-bold text-gray-600 text-center mt-1',{text:p.label})); return d; });
            const picWrap=el('div','flex flex-wrap gap-2 flex-1');
            if(this.sentence.length===0) picWrap.appendChild(el('span','text-gray-400 italic text-sm',{text:'Toque nas figuras para montar uma frase...'}));
            else picItems.forEach(d=>picWrap.appendChild(d));
            const btnRow=el('div','flex gap-2');
            btnRow.append(el('button','p-3 rounded-xl bg-red-100 text-red-500 hover:bg-red-200 border-b-4 border-red-200 active:border-b-0 transition-all text-xl',{text:'❌',onClick:()=>this.clear()}),el('button',`flex items-center gap-2 px-4 py-3 rounded-xl bg-green-500 text-white font-bold hover:bg-green-600 border-b-4 border-green-700 active:border-b-0 transition-all ${this.processing?'opacity-50 pointer-events-none':''}`,{onClick:()=>this.speak()},[el('span','',{text:'🔊'}),el('span','hidden md:inline',{text:'Falar'})]));
            const strip=el('div','sentence-strip'); strip.append(picWrap,btnRow);
            const tabs=el('div','flex flex-wrap gap-2 justify-center');
            Object.keys(PICTOGRAMS).forEach(cat=>{ tabs.appendChild(el('button',`tab-pill${cat===this.cat?' active':''}`,{text:cat,onClick:()=>{this.cat=cat;Sound.pop();this.render();}})); });
            const grid=el('div','grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 overflow-y-auto max-h-96 p-1');
            PICTOGRAMS[this.cat].forEach(item=>{ grid.appendChild(el('button',`pic-card ${item.cat}`,{onClick:()=>this.addPic(item)},[el('span','text-4xl md:text-5xl mb-1',{text:item.emoji}),el('span','font-bold text-gray-700 text-sm text-center',{text:item.label})])); });
            card.append(hdr,robotRow,strip,tabs,grid);
            this.p.appendChild(card);
        }
    }

    class EmotionGame {
        constructor(p, sv) {
            this.p=p; this.sv=sv; this.score=0; this.round=0; this.maxRounds=5;
            this.state='PLAYING'; this.mode='MENU'; this.showHelp=false;
            this.options=[]; this.feedback=null; this.currentEmotion=null; this.currentStory=null;
            const s=localStorage.getItem('emotionBest'); this.best=s?parseInt(s):0;
        }
        setMode(m) { this.mode=m;this.score=0;this.round=0;this.setupRound();this.render(); }
        setupRound() {
            if(this.round>=this.maxRounds){
                this.state='FINISHED'; Sound.win();
                if(this.mode==='CLASSIC'&&this.score>this.best){this.best=this.score;localStorage.setItem('emotionBest',this.best);}
                confetti.burst(200); return;
            }
            const makeOpts=(target,distractors)=>{ let opts=[{label:target.emotion||target.target,emoji:target.emoji,isCorrect:true}]; distractors.slice(0,2).forEach(e=>opts.push({label:'???',emoji:e,isCorrect:false})); return opts.sort(()=>Math.random()-.5); };
            if(this.mode==='CLASSIC'){ const t=EMOTION_LEVELS[Math.floor(Math.random()*EMOTION_LEVELS.length)]; this.currentEmotion=t; this.options=makeOpts({emotion:t.target,emoji:t.emoji},[...t.distractors].sort(()=>Math.random()-.5).slice(0,2)); }
            else { const t=EMOTION_STORIES[Math.floor(Math.random()*EMOTION_STORIES.length)]; this.currentStory=t; this.options=makeOpts(t,[...t.distractors].sort(()=>Math.random()-.5).slice(0,2)); setTimeout(()=>Sound.speak(t.text),500); }
            this.state='PLAYING'; this.feedback=null;
        }
        answer(opt) {
            if(this.state!=='PLAYING') return;
            this.state='FEEDBACK';
            if(opt.isCorrect){this.score++;this.feedback={msg:'Muito bem! 🎉',ok:true};Sound.ok();}
            else{this.feedback={msg:'Ops! Tente de novo.',ok:false};Sound.fail();}
            this.render();
            setTimeout(()=>{this.round++;this.setupRound();this.render();},2200);
        }
        restart() { this.score=0;this.round=0;this.setupRound();this.render(); }
        toggleHelp() { this.showHelp=!this.showHelp;Sound.pop();this.render(); }
        render() {
            this.p.innerHTML='';
            if(this.showHelp){
                const ov=el('div','modal-overlay',{onClick:e=>{if(e.target===ov)this.toggleHelp();}});
                const box=el('div','modal-box anim-pop');
                box.appendChild(el('button','absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl font-bold',{text:'✕',onClick:()=>this.toggleHelp()}));
                box.appendChild(el('h3','font-lilita text-xl text-orange-500 mb-4',{text:'🎮 Jogos das Emoções'}));
                const list=el('div','space-y-4 text-gray-600 text-left text-sm');
                list.appendChild(el('p','font-bold text-orange-400 text-base',{text:'🤔 Identificar'}));
                list.appendChild(el('p','',{text:'Reconheça as expressões faciais (Feliz, Triste, Bravo).'}));
                list.appendChild(el('p','font-bold text-purple-500 text-base mt-2',{text:'📖 Histórias'}));
                list.appendChild(el('p','',{text:'Ouça uma história e descubra como o personagem se sente!'}));
                list.appendChild(el('p','italic text-xs text-gray-400 mt-2',{text:'⚡ Dica: Toque no botão de som para ouvir a história novamente.'}));
                box.appendChild(list);
                box.appendChild(el('button','mt-5 w-full bg-green-500 text-white font-bold py-3 rounded-xl hover:bg-green-600',{text:'Entendi, vamos jogar! 🎮',onClick:()=>this.toggleHelp()}));
                ov.appendChild(box); this.p.appendChild(ov);
            }
            const card=el('div','main-card emo-container w-full max-w-3xl p-5 md:p-8 flex flex-col gap-5 text-center justify-center relative anim-fadein',{style:'min-height:65vh'});
            const backTxt=this.mode==='MENU'?'Voltar':'Menu';
            const topRow=el('div','flex justify-between items-center');
            topRow.append(el('button','btn-back',{onClick:()=>{if(this.mode!=='MENU'){this.mode='MENU';this.render();}else this.sv('HOME');}},[el('span','',{text:'⬅️'}),el('span','',{text:backTxt})]),el('button','btn-help',{text:'?',onClick:()=>this.toggleHelp()}));
            card.appendChild(topRow);
            if(this.mode==='MENU'){
                card.appendChild(el('h2','font-lilita text-3xl text-orange-500 mt-2',{text:'Escolha um Jogo'}));
                const row=el('div','flex flex-col md:flex-row justify-center gap-8 items-center mt-4');
                row.append(el('button','home-btn home-btn-orange',{style:'background:linear-gradient(160deg,#FFA726,#EF6C00)',onClick:()=>this.setMode('CLASSIC')},[el('span','home-btn-icon',{text:'🤔'}),el('span','',{text:'Identificar'})]),el('button','home-btn',{style:'background:linear-gradient(160deg,#AB47BC,#7B1FA2)',onClick:()=>this.setMode('STORY')},[el('span','home-btn-icon',{text:'📖'}),el('span','',{text:'Histórias'})]));
                card.appendChild(row);
            } else if(this.state==='FINISHED'){
                const win=el('div','flex flex-col items-center gap-4 anim-tada');
                win.appendChild(el('span','text-8xl',{text:'🏆'}));
                win.appendChild(el('h2','font-lilita text-4xl text-orange-500',{text:'Parabéns!'}));
                win.appendChild(el('p','text-xl text-gray-600',{text:`Você acertou ${this.score} de ${this.maxRounds}!`}));
                win.appendChild(el('button','mt-4 bg-green-500 text-white font-bold text-xl py-4 px-10 rounded-2xl shadow-lg hover:bg-green-600',{text:'Jogar Novamente',onClick:()=>this.restart()}));
                card.appendChild(win);
            } else {
                const barWrap=el('div','w-full bg-gray-200 rounded-full h-3 overflow-hidden');
                barWrap.appendChild(el('div','progress-gradient h-3',{style:`width:${(this.round/this.maxRounds)*100}%`}));
                card.appendChild(barWrap);
                if(this.mode==='CLASSIC'){ card.appendChild(el('h2','font-lilita text-2xl md:text-3xl text-gray-700 mt-2',{text:`🔍 Quem está ${this.currentEmotion.target}?`})); }
                else {
                    const storyBox=el('div','bg-yellow-50 border-2 border-yellow-300 rounded-2xl p-5 mt-2 flex flex-col items-center gap-3');
                    storyBox.appendChild(el('p','text-lg md:text-xl font-semibold text-gray-700',{text:this.currentStory.text}));
                    storyBox.appendChild(el('button','btn-listen',{onClick:()=>Sound.speak(this.currentStory.text)},[el('span','',{text:'🔊'}),el('span','',{text:'Ouvir de novo'})]));
                    card.appendChild(storyBox);
                    card.appendChild(el('h2','font-lilita text-xl text-gray-500 mt-1',{text:'Como ele se sente? 🌙'}));
                }
                const optRow=el('div','flex flex-wrap justify-center gap-5 md:gap-8 mt-4');
                const borderMap=['border-yellow','border-blue','border-red'];
                this.options.forEach((opt,i)=>{
                    let extra='';
                    if(this.state==='FEEDBACK'){ if(opt.isCorrect&&this.feedback.ok) extra='correct'; else if(!opt.isCorrect&&!this.feedback.ok) extra='wrong anim-shake'; }
                    optRow.appendChild(el('button',`emoji-card ${borderMap[i]||''} ${extra}`,{text:opt.emoji,onClick:()=>this.answer(opt)}));
                });
                card.appendChild(optRow);
                if(this.state==='FEEDBACK'){
                    const fbOverlay=el('div','absolute inset-0 flex items-center justify-center bg-white/85 rounded-xl z-10');
                    fbOverlay.appendChild(el('span',`font-lilita text-3xl md:text-4xl anim-pop ${this.feedback.ok?'text-green-600':'text-orange-500'}`,{text:this.feedback.msg}));
                    card.appendChild(fbOverlay);
                }
            }
            this.p.appendChild(card);
        }
    }

    document.addEventListener('DOMContentLoaded', ()=>new App(document.getElementById('app-container')));
    </script>
